<div class="relative w-full h-full flex items-center justify-center overflow-hidden bg-[var(--surface-strong)] rounded-[2rem]">
  <!-- Background Glow -->
  <div class="absolute inset-0 bg-radial-[var(--accent)]/5 blur-3xl"></div>
  
  <svg viewBox="0 0 800 600" class="w-full h-full preserve-3d">
    <!-- Define Filters and Gradients -->
    <defs>
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="6" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
      
      <linearGradient id="branchGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:var(--accent);stop-opacity:0.2" />
        <stop offset="50%" style="stop-color:var(--accent);stop-opacity:0.8" />
        <stop offset="100%" style="stop-color:var(--accent-soft);stop-opacity:1" />
      </linearGradient>

      <radialGradient id="nodeGradient">
        <stop offset="0%" style="stop-color:white;stop-opacity:0.9" />
        <stop offset="100%" style="stop-color:var(--accent);stop-opacity:0.4" />
      </radialGradient>
    </defs>

    <!-- The "Living" Network -->
    <g class="network-group" filter="url(#glow)">
      <!-- Branches (Animated paths) -->
      @for (path of branches; track path) {
        <path [attr.d]="path" 
              fill="none" 
              stroke="url(#branchGradient)" 
              stroke-width="2" 
              stroke-linecap="round"
              class="branch-path" />
      }

      <!-- Nodes (Pulsing points) -->
      @for (node of nodes; track node.x) {
        <g class="node-pulse" [style.animation-delay]="node.delay + 'ms'">
          <circle [attr.cx]="node.x" [attr.cy]="node.y" [attr.r]="node.size" fill="url(#nodeGradient)" />
          <circle [attr.cx]="node.x" [attr.cy]="node.y" [attr.r]="node.size * 2" 
                  fill="var(--accent)" fill-opacity="0.1" class="node-outer-glow" />
        </g>
      }
    </g>

    <!-- Central Compass/Core -->
    <g transform="translate(400, 300)" class="central-core">
      <circle r="60" fill="var(--bg)" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4 4" class="core-ring" />
      <image href="/assets/living-atlas-logo.png" x="-40" y="-40" width="80" height="80" class="core-logo" />
    </g>
  </svg>

  <style>
    .branch-path {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawBranch 4s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
    }

    @keyframes drawBranch {
      0% { stroke-dashoffset: 1000; opacity: 0; }
      20% { opacity: 0.1; }
      100% { stroke-dashoffset: 0; opacity: 0.8; }
    }

    .node-pulse {
      animation: pulseNode 3s ease-in-out infinite;
    }

    @keyframes pulseNode {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .node-outer-glow {
      animation: ripple 4s ease-out infinite;
    }

    @keyframes ripple {
      0% { r: 5; opacity: 0.8; }
      100% { r: 30; opacity: 0; }
    }

    .central-core {
      animation: floatCore 6s ease-in-out infinite;
    }

    @keyframes floatCore {
      0%, 100% { transform: translate(400px, 300px); }
      50% { transform: translate(400px, 290px); }
    }

    .core-ring {
      animation: spin 20s linear infinite;
      transform-origin: center;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</div>
